<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Media Vault Pro</title>
    <style>
        body { background-color: #080808; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .card:hover { border-color: #3b82f6; transform: translateY(-5px); }
    </style>
</head>
<body class="p-8">
    <header class="flex justify-between items-center mb-12">
        <h1 class="text-2xl font-black tracking-widest text-blue-500">VAULT_SYSTEM v1.0</h1>
        <div class="glass px-4 py-2 rounded-full text-sm font-mono">STATUS: ENCRYPTED</div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6" id="gallery">
        <!-- Carte Dynamique -->
        <div class="card glass p-4 rounded-2xl transition-all cursor-pointer">
            <div class="w-full h-40 bg-gray-900 rounded-lg mb-4 overflow-hidden">
                <div class="w-full h-full bg-gradient-to-br from-blue-900/20 to-purple-900/20 flex items-center justify-center">
                    <span class="text-gray-500 text-xs">PREVIEW_NOT_LOADED</span>
                </div>
            </div>
            <h3 class="font-bold text-sm uppercase tracking-tight">Dossier_Contenu_A</h3>
            <p class="text-gray-500 text-[10px] mt-1">14 Fichiers • 2.4 GB</p>
        </div>
    </div>
</body>
</html>
